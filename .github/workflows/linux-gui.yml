name: Nuta GUI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-windows-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
      - uses: gradle/actions/setup-gradle@v5
      - name: Build Windows EXE (diagnostic console)
        run: .\gradlew.bat --no-daemon :composeApp:packageExe
      - name: Upload Windows diagnostic package
        uses: actions/upload-artifact@v5
        with:
          name: nuta-windows-exe-diagnostic
          path: composeApp/build/compose/binaries/main/exe/*.exe
          if-no-files-found: error

  build-android-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
      - uses: android-actions/setup-android@v4
      - uses: gradle/actions/setup-gradle@v5
      - name: Prepare Android release keystore
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: |
          test -n "$ANDROID_KEYSTORE_B64"
          echo "$ANDROID_KEYSTORE_B64" | base64 --decode > "$RUNNER_TEMP/nuta-release.jks"
      - name: Build Android signed release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/nuta-release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon :androidApp:assembleRelease
      - name: Upload Android release APK
        uses: actions/upload-artifact@v5
        with:
          name: nuta-android-apk
          path: androidApp/build/outputs/apk/release/*.apk
          if-no-files-found: error

  build-linux-gui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
      - uses: gradle/actions/setup-gradle@v5
      - name: Build Linux AppImage
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon :composeApp:packageAppImage
      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v5
        with:
          name: nuta-linux-appimage
          path: composeApp/build/compose/binaries/main/app/*.AppImage
          if-no-files-found: error

      - name: Build GUI test image
        run: docker compose build gui-test

      - name: Start GUI
        run: docker compose up -d gui-test

      - name: Wait for healthcheck
        shell: bash
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:6081/health; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs gui-test
          exit 1

      - name: Capture screenshot
        run: curl --fail http://127.0.0.1:6081/screenshot --output nuta-linux.png

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: linux-gui-diagnostics
          path: |
            nuta-linux.png

      - name: Stop GUI
        if: always()
        run: docker compose down
